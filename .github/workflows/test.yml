name: test
on:
  push:
  schedule:
    # Nightly run of the heavy statistical-validity (slow) lane.
    - cron: "0 3 * * *"
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --extra ci
      - name: Parse libraries and run doctests (./scripts/run-modules)
        run: uv run ./scripts/run-modules
      - name: Lint (ruff)
        run: uv run ruff check src tests
      - run: uv run ./scripts/run-notebooks
      - run: uv run validate-pyproject pyproject.toml
      # Fast lane (structural leancheck + unit tests). The 'slow' statistical
      # tests are excluded by default via addopts in pyproject.toml.
      - run: uv run pytest
      - run: uv run ./scripts/run-coverage

  statistical:
    # Heavy statistical-validity lane: nightly schedule or manual dispatch only.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --extra ci
      - name: Run slow statistical-validity tests
        run: uv run pytest -m slow
